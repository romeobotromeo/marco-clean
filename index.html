<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TextMarco — The Future of Buying and Selling Homes</title>
  <meta name="description" content="The future of buying and selling homes. Coming soon.">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #080810;
      color: #e8e8f0;
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80vw;
      height: 60vh;
      background: radial-gradient(ellipse at center, rgba(100, 80, 255, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1;
      padding: 2rem;
      text-align: center;
    }

    .wordmark {
      font-size: clamp(0.65rem, 1.5vw, 0.75rem);
      font-weight: 500;
      letter-spacing: 0.35em;
      color: rgba(232, 232, 240, 0.35);
      text-transform: uppercase;
      margin-bottom: clamp(2.5rem, 6vh, 4rem);
    }

    .headline {
      font-size: clamp(1.8rem, 5.5vw, 4.5rem);
      font-weight: 300;
      line-height: 1.15;
      letter-spacing: -0.01em;
      color: #e8e8f0;
      max-width: 820px;
    }

    .headline em {
      font-style: normal;
      color: rgba(232, 232, 240, 0.45);
    }

    .divider {
      width: 1px;
      height: clamp(2rem, 5vh, 3.5rem);
      background: linear-gradient(to bottom, transparent, rgba(232,232,240,0.2), transparent);
      margin: clamp(1.5rem, 4vh, 2.5rem) auto;
    }

    .status {
      font-size: clamp(0.6rem, 1.2vw, 0.7rem);
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(232, 232, 240, 0.3);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(120, 100, 255, 0.7);
      animation: pulse 2.5s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.3); }
    }

    .corner {
      position: fixed;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      color: rgba(232, 232, 240, 0.15);
      text-transform: uppercase;
      z-index: 1;
    }
    .corner-bl { bottom: 1.75rem; left: 2rem; }
    .corner-br { bottom: 1.75rem; right: 2rem; }

    @media (max-width: 480px) {
      .corner { display: none; }
      .wordmark { margin-bottom: 2rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="wordmark">TextMarco</span>
    <h1 class="headline">The Future of Buying<br><em>and Selling</em> Homes</h1>
    <div class="divider"></div>
    <p class="status">
      <span class="status-dot"></span>
      Coming Soon
    </p>
  </div>

  <span class="corner corner-bl">textmarco.com</span>
  <span class="corner corner-br">2026</span>
</body>
</html>
